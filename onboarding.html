<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.googleapis.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'">
<title>Get set up — Safeguard Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="sg-redesign.css">
<style>
  body{min-height:100vh;display:flex;flex-direction:column}

  /* ── Legacy header — hidden by sg-nav.js, kept for ids/markup ── */
  .hdr{background:var(--sg-card);border-bottom:1px solid var(--sg-border);padding:13px 28px}
  .hdr-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;margin-right:auto}
  .brand-text{display:flex;flex-direction:column;line-height:1.1}
  .brand-text small{font-size:9px;font-weight:700;letter-spacing:0.22em;color:var(--sg-blue);text-transform:uppercase}
  .brand-name{font-family:var(--sg-head);font-weight:800;font-size:19px;color:var(--sg-ink);margin-top:2px}

  /* ── Page layout ── */
  .page{flex:1;padding:36px 24px 80px}
  .wrap{max-width:760px;margin:0 auto}
  .eyebrow{font-family:var(--sg-sans);font-weight:700;font-size:12px;letter-spacing:0.15em;
           color:var(--sg-blue);text-transform:uppercase;margin-bottom:10px}
  h1{font-family:var(--sg-head);font-weight:800;font-size:38px;color:var(--sg-ink);
     line-height:1.05;letter-spacing:-0.02em;margin-bottom:6px}
  .page-lede{font-size:17px;color:var(--sg-body);margin-bottom:18px}

  /* ── Progress bar ── */
  .progress{height:10px;background:var(--sg-track);border-radius:var(--sg-r-pill);overflow:hidden;max-width:560px;margin-bottom:10px}
  .progress > div{height:100%;background:var(--sg-progress);
                  border-radius:var(--sg-r-pill);transition:width 0.4s ease}
  .progress-label{font-size:12px;color:var(--sg-muted);font-weight:600;letter-spacing:0.02em;margin-bottom:26px}

  /* ── Card / step ── */
  .card{background:var(--sg-card);border:1px solid var(--sg-border);border-radius:var(--sg-r-card);
        padding:24px;margin-bottom:18px}
  @media (max-width:620px){.card{padding:20px}}
  .wz-eyebrow{font-family:var(--sg-sans);font-weight:700;font-size:12px;letter-spacing:0.15em;color:var(--sg-blue);
              text-transform:uppercase;margin-bottom:6px}
  .wz-title{font-family:var(--sg-head);font-weight:700;font-size:22px;color:var(--sg-ink);
            line-height:1.2;margin-bottom:16px}
  .wz-lede{font-size:14.5px;color:var(--sg-body);margin-bottom:18px;line-height:1.6}
  .wz-note{font-size:13px;color:var(--sg-muted);font-style:italic;margin-top:8px;line-height:1.5}
  .wz-hint{font-size:13px;color:var(--sg-muted);margin-bottom:6px;line-height:1.5}
  .sub-title{font-family:var(--sg-head);font-weight:700;font-size:17px;color:var(--sg-ink);
             margin:20px 0 10px 0;padding-top:8px;border-top:1px solid var(--sg-rule)}

  /* ── Form fields ── */
  label{display:block;font-family:var(--sg-sans);font-weight:700;font-size:11.5px;color:var(--sg-body);
        letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px}
  .opt{font-weight:500;color:var(--sg-muted);text-transform:none;letter-spacing:0;margin-left:4px}
  .fi{width:100%;padding:13px 15px;border:1px solid var(--sg-border-strong);border-radius:var(--sg-r-input);
      font-family:var(--sg-sans);font-size:15px;color:var(--sg-ink);background:var(--sg-field-bg);
      transition:border-color var(--sg-t),box-shadow var(--sg-t),background var(--sg-t)}
  .fi:focus{border-color:var(--sg-blue);background:#fff;box-shadow:var(--sg-focus-ring);outline:none}
  .fi[aria-invalid="true"]{border-color:var(--sg-red)}
  textarea.fi{min-height:90px;resize:vertical;font-family:var(--sg-sans);line-height:1.55}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .row-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:14px}
  .row-sig{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:620px){.row,.row-3,.row-sig{grid-template-columns:1fr}}

  /* ── Pills (segmented multi-select) ── */
  .pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .pill{position:relative;cursor:pointer}
  .pill input{position:absolute;opacity:0;pointer-events:none}
  .pill span{display:inline-flex;padding:9px 16px;border:1px solid var(--sg-border-strong);
             border-radius:var(--sg-r-pill);font-size:13px;font-weight:600;background:#fff;
             color:var(--sg-body);transition:all var(--sg-t);user-select:none}
  .pill:hover span{border-color:var(--sg-blue)}
  .pill input:checked + span{background:var(--sg-navy);border-color:var(--sg-navy);color:#fff}
  .pill input:focus-visible + span{box-shadow:var(--sg-focus-ring)}
  .prompt{font-weight:600;color:var(--sg-ink);margin-bottom:8px;font-size:14px}

  /* ── Screening table ── */
  .table-wrap{margin:12px 0 16px 0;border:1px solid var(--sg-border);border-radius:var(--sg-r-card-sm);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{background:var(--sg-navy);color:#fff;font-family:var(--sg-sans);font-size:11px;
           font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:12px 14px;text-align:left}
  thead th.c{text-align:center}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--sg-rule);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody td + td{border-left:1px solid var(--sg-rule)}
  tbody tr:nth-child(even) td{background:var(--sg-field-bg)}
  td.q{font-size:14px;color:var(--sg-body);line-height:1.5}
  td.yn{text-align:center;width:70px}
  td.yn input{width:18px;height:18px;accent-color:var(--sg-blue);cursor:pointer}

  /* ── Attestations ── */
  .attest{display:flex;align-items:flex-start;gap:10px;margin:4px 0 12px 0;
          padding:11px 14px;background:var(--sg-field-bg);border:1px solid var(--sg-border);
          border-radius:var(--sg-r-input);cursor:pointer;transition:border-color var(--sg-t)}
  .attest:hover{border-color:var(--sg-blue)}
  .attest input{margin-top:2px;width:16px;height:16px;accent-color:var(--sg-blue);flex-shrink:0;cursor:pointer}
  .attest span{font-size:13px;color:var(--sg-body);line-height:1.45;font-weight:500}
  .attest input:checked ~ span{color:var(--sg-ink)}

  /* ── Youth callout (amber pending — the one warm-amber use) ── */
  .youth-callout{display:flex;gap:14px;align-items:flex-start;background:var(--sg-warn-bg);
                 border:1px solid var(--sg-warn-border);border-left:4px solid var(--sg-warn-text);
                 border-radius:var(--sg-r-card);padding:16px 18px;margin-bottom:18px}
  .youth-callout .ico{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--sg-warn-icon);
                      color:var(--sg-warn-text);display:flex;align-items:center;justify-content:center;
                      font-family:var(--sg-head);font-weight:700;font-size:16px;margin-top:2px}
  .youth-callout .who{display:block;font-size:10px;font-weight:700;letter-spacing:0.22em;color:var(--sg-warn-text);text-transform:uppercase;margin-bottom:4px}
  .youth-callout .head{display:block;font-family:var(--sg-head);font-weight:700;font-size:18px;color:var(--sg-ink);line-height:1.25;margin-bottom:4px}
  .youth-callout .sub{display:block;font-size:13px;color:var(--sg-body);line-height:1.55}

  /* ── Review ── */
  .rv-sec{border:1px solid var(--sg-border);border-radius:var(--sg-r-card-sm);padding:16px 18px;margin-bottom:14px;background:#fff}
  .rv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
           font-family:var(--sg-head);font-weight:700;font-size:17px;color:var(--sg-ink)}
  .rv-edit{background:#fff;border:1px solid var(--sg-border-strong);border-radius:var(--sg-r-btn);padding:6px 12px;
           font-family:var(--sg-sans);font-size:12px;font-weight:600;color:var(--sg-blue);cursor:pointer;transition:all var(--sg-t)}
  .rv-edit:hover{border-color:var(--sg-blue)}
  .rv-row{display:grid;grid-template-columns:180px 1fr;gap:10px;padding:5px 0;border-top:1px solid var(--sg-rule-2);font-size:14px}
  .rv-row:first-of-type{border-top:none}
  .rv-k{color:var(--sg-muted);font-weight:600}
  .rv-v{color:var(--sg-body);word-break:break-word}
  @media(max-width:620px){.rv-row{grid-template-columns:1fr}}

  /* ── Buttons / nav ── */
  .nav{display:flex;gap:12px;align-items:center;margin-top:24px;flex-wrap:wrap}
  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
       padding:12px 20px;border:1px solid transparent;border-radius:var(--sg-r-btn);font-family:var(--sg-sans);
       font-size:14px;font-weight:600;cursor:pointer;
       transition:box-shadow var(--sg-t),border-color var(--sg-t),background var(--sg-t);text-decoration:none}
  .btn-primary{background:var(--sg-navy);color:#fff;box-shadow:var(--sg-shadow-btn)}
  .btn-primary:hover:not(:disabled){background:#0c4262}
  .btn-primary:disabled{background:var(--sg-muted);cursor:not-allowed;box-shadow:none}
  .btn-secondary{background:#fff;color:var(--sg-body);border:1px solid var(--sg-border-strong)}
  .btn-secondary:hover{border-color:var(--sg-blue);color:var(--sg-ink)}
  .btn-ghost{background:none;color:var(--sg-muted);border:none;font-weight:600;font-size:13px;cursor:pointer;padding:8px 4px}
  .btn-ghost:hover{color:var(--sg-blue)}
  .nav-spacer{margin-left:auto}
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
        border-radius:50%;animation:spin 0.7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn.loading .spin{display:inline-block}

  .wz-next{margin:6px 0 18px 18px;color:var(--sg-body);font-size:14px;line-height:1.7}

  /* ── Submitted banner ── */
  .submitted-banner{background:var(--sg-green-bg);border:1px solid var(--sg-green-bg);border-radius:var(--sg-r-card);
                    padding:18px 20px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start}
  .submitted-banner .ico{width:30px;height:30px;border-radius:50%;background:var(--sg-green);flex-shrink:0;
                         display:flex;align-items:center;justify-content:center;margin-top:2px}
  .submitted-banner .ico svg{width:16px;height:16px;color:#fff}
  .submitted-banner b{display:block;color:var(--sg-ink);font-family:var(--sg-head);font-weight:700;font-size:16px;margin-bottom:3px}
  .submitted-banner span{color:var(--sg-body);font-size:13px;line-height:1.5;display:block}
  .submitted-banner code{font-family:ui-monospace,Menlo,monospace;color:var(--sg-navy);background:#fff;
                         padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;border:1px solid var(--sg-border)}

  /* ── Messages ── */
  .msg{padding:11px 14px;border-radius:var(--sg-r-input);font-size:13px;margin-top:14px;display:none}
  .msg.ok{background:var(--sg-green-bg);color:var(--sg-green);border:1px solid var(--sg-green-bg);display:block}
  .msg.err{background:var(--sg-red-bg);color:var(--sg-red);border:1px solid var(--sg-red-border);display:block}

  .auth-gate{text-align:center;padding:80px 24px;color:var(--sg-muted);font-size:14px}
  footer{text-align:center;padding:24px;font-size:12px;color:var(--sg-muted)}
  footer a{color:var(--sg-blue);text-decoration:none}

  @media (max-width:860px){h1{font-size:30px}.btn{min-height:44px}}
</style>
</head>
<body class="sg-redesign">

<header class="hdr">
  <div class="hdr-inner">
    <a class="brand" href="dashboard.html" aria-label="Safeguard Hub home">
      <svg viewBox="0 0 24 28" width="22" height="26" fill="none" aria-hidden="true">
        <path d="M12 1 L22 5 V14 C22 20 17 25 12 27 C7 25 2 20 2 14 V5 Z" stroke="#C4A46A" stroke-width="1.5"/>
        <path d="M12 1 L22 5 V14 C22 20 17 25 12 27 Z" fill="#C4A46A" fill-opacity="0.12"/>
      </svg>
      <div class="brand-text"><small>Safeguard Hub</small><span class="brand-name">Bethany Chapel</span></div>
    </a>
    <div id="userChip" style="margin-left:8px"></div>
  </div>
</header>

<main class="page">

  <div class="wrap" id="authGate"><div class="auth-gate">Checking your access&hellip;</div></div>

  <div class="wrap" id="wizardWrap" style="display:none">
    <div class="eyebrow">Safeguard Hub &middot; Getting set up</div>
    <h1>Welcome to Bethany Chapel</h1>
    <div class="page-lede">A quick, one-time setup so we can place you well and keep our children and youth safe.</div>

    <div class="progress"><div id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">&nbsp;</div>

    <div class="card"><div id="wizardHost"></div></div>

    <div id="msg" class="msg"></div>

    <div class="nav" id="navBar">
      <button type="button" class="btn btn-secondary" id="backBtn" style="display:none">&larr; Back</button>
      <div class="actions nav-spacer">
        <button type="button" class="btn-ghost" id="saveLaterBtn" style="display:none">Save &amp; finish later</button>
        <button type="button" class="btn btn-primary" id="nextBtn" style="display:none"><span class="spin"></span><span class="label">Continue &rarr;</span></button>
        <button type="button" class="btn btn-primary" id="submitBtn" style="display:none"><span class="spin"></span><span class="label">Submit application</span></button>
      </div>
    </div>
  </div>

</main>

<footer>Safeguard Hub &middot; Bethany Chapel &middot; <a href="privacy.html">Privacy</a></footer>

<script type="module">
  import { onUserChange } from "./sg-auth.js";
  import { getOrCreateProfile } from "./sg-profile.js";
  import { mountUserChip } from "./sg-user-chip.js";
  import { createWizard } from "./sg-wizard.js";

  mountUserChip(document.getElementById("userChip"));

  const HERE         = "onboarding.html";
  const authGate     = document.getElementById("authGate");
  const wizardWrap   = document.getElementById("wizardWrap");
  const host         = document.getElementById("wizardHost");
  const progressBar  = document.getElementById("progressBar");
  const progressLabel= document.getElementById("progressLabel");
  const msg          = document.getElementById("msg");
  const backBtn      = document.getElementById("backBtn");
  const nextBtn      = document.getElementById("nextBtn");
  const submitBtn    = document.getElementById("submitBtn");
  const saveLaterBtn = document.getElementById("saveLaterBtn");

  function showMsg(text, kind) {
    if (!text) { msg.className = "msg"; msg.textContent = ""; return; }
    msg.textContent = text; msg.className = "msg " + kind;
  }

  let wiz = null;

  // ── Auth gate: signed-in + verified ──
  onUserChange(async user => {
    if (!user) { location.replace("sign-in.html?next=" + encodeURIComponent(HERE)); return; }
    if (!user.emailVerified) { location.replace("verify-email.html"); return; }

    let profile = null;
    try { profile = await getOrCreateProfile(); } catch (_) { profile = null; }

    authGate.style.display = "none";
    wizardWrap.style.display = "block";

    wiz = createWizard({
      host,
      onProgress: ({ pct, label }) => {
        progressBar.style.width = pct + "%";
        progressLabel.textContent = label || " ";
      },
      onMessage: (text, kind) => showMsg(text, kind),
      onNavState: (st) => {
        if (st.submitting !== undefined) {
          submitBtn.classList.toggle("loading", !!st.submitting);
          submitBtn.disabled = !!st.submitting;
          nextBtn.disabled = !!st.submitting;
          backBtn.disabled = !!st.submitting;
          return;
        }
        backBtn.style.display      = st.showBack ? "inline-flex" : "none";
        backBtn.disabled           = !st.canBack;
        nextBtn.style.display      = st.showNext ? "inline-flex" : "none";
        submitBtn.style.display    = st.showSubmit ? "inline-flex" : "none";
        saveLaterBtn.style.display = st.showSaveLater ? "inline-block" : "none";
        if (st.nextLabel) nextBtn.querySelector(".label").textContent = st.nextLabel;
        nextBtn.disabled = false; backBtn.disabled = !st.canBack;
        submitBtn.classList.remove("loading"); submitBtn.disabled = false;
      },
    });

    try {
      wiz.hydrate(profile);
      wiz.render();
    } catch (err) {
      // Safety valve: never leave the user on a blank screen.
      host.innerHTML = '<p class="wz-lede">Something went wrong loading the form. ' +
        'You can still use the <a href="profile-setup.html" style="color:var(--sg-blue)">standard setup</a> ' +
        'or the <a href="SG-FRM-001.html" style="color:var(--sg-blue)">application form</a>.</p>';
      console.error("Wizard boot error:", err);
    }
  });

  backBtn.addEventListener("click", () => wiz && wiz.back());
  nextBtn.addEventListener("click", () => wiz && wiz.next());
  saveLaterBtn.addEventListener("click", () => wiz && wiz.saveLater());
  submitBtn.addEventListener("click", () => wiz && wiz.submit());
</script>

<script src="sg-nav.js"></script>
</body>
</html>
