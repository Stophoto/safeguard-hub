<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.googleapis.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'">
<title>Get set up — Safeguard Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" integrity="sha384-OrDai7FVovo0Oy2LGx2+cgUuBlW1mselxN+LN2wvDIyvsMon6y+d7I5jJy+Gw/nZ" crossorigin="anonymous">
<style>
  :root {
    --navy:#1B3A4B; --navy-deep:#0F2530; --teal:#2E6B7F; --gold:#B09055;
    --gold-warm:#C4A46A; --cream:#FAF8F3; --sand:#F2EFE8; --body:#3D3835;
    --muted:#9A958F; --border:#E4E0DA; --white:#FFFFFF;
    --error:#C0392B; --error-bg:#FFF0EE; --success:#27AE60; --success-bg:#EEFBF3;
    --warn:#B07A1E; --warn-bg:#FFF5E6;
    --serif:'DM Serif Display',Georgia,serif;
    --sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --transition:0.2s cubic-bezier(0.4,0,0.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--body);background:var(--cream);
       -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55;
       min-height:100vh;display:flex;flex-direction:column}

  /* ── Header ── */
  .hdr{background:linear-gradient(180deg,var(--navy-deep) 0%,var(--navy) 100%);
       border-bottom:2px solid rgba(176,144,85,0.25);padding:14px 28px}
  .hdr-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;margin-right:auto}
  .brand-text{display:flex;flex-direction:column;line-height:1.05}
  .brand-text small{font-size:9px;font-weight:700;letter-spacing:0.22em;color:var(--gold);text-transform:uppercase}
  .brand-name{font-family:var(--serif);font-size:19px;color:var(--white);margin-top:2px}

  /* ── Page layout ── */
  .page{flex:1;padding:36px 24px 80px}
  .wrap{max-width:760px;margin:0 auto}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:0.22em;color:var(--gold);
           text-transform:uppercase;margin-bottom:10px}
  h1{font-family:var(--serif);font-size:34px;color:var(--navy);font-weight:400;
     line-height:1.1;margin-bottom:6px}
  .page-lede{font-size:14px;color:var(--muted);margin-bottom:18px}

  /* ── Progress bar (copied from dashboard.html) ── */
  .progress{height:8px;background:var(--border);border-radius:4px;overflow:hidden;max-width:560px;margin-bottom:10px}
  .progress > div{height:100%;background:linear-gradient(to right,var(--teal),var(--gold));
                  border-radius:4px;transition:width 0.4s ease}
  .progress-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.02em;margin-bottom:26px}

  /* ── Card / step ── */
  .card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;
        padding:30px 34px;box-shadow:0 4px 24px rgba(0,0,0,0.04);margin-bottom:18px}
  @media (max-width:620px){.card{padding:24px 20px}}
  .wz-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.22em;color:var(--gold);
              text-transform:uppercase;margin-bottom:6px}
  .wz-title{font-family:var(--serif);font-size:25px;color:var(--navy);font-weight:400;
            line-height:1.2;margin-bottom:16px}
  .wz-lede{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6}
  .wz-note{font-size:13px;color:var(--muted);font-style:italic;margin-top:8px;line-height:1.5}
  .wz-hint{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.5}
  .sub-title{font-family:var(--serif);font-size:18px;color:var(--navy);font-weight:400;
             margin:20px 0 10px 0;padding-top:8px;border-top:1px solid var(--sand)}

  /* ── Form fields ── */
  label{display:block;font-size:11px;font-weight:700;color:var(--navy);
        letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px}
  .opt{font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:4px}
  .fi{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;
      font-family:var(--sans);font-size:15px;color:var(--body);background:var(--white);
      transition:border-color var(--transition),box-shadow var(--transition)}
  .fi:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(46,107,127,0.10);outline:none}
  .fi[aria-invalid="true"]{border-color:var(--error)}
  textarea.fi{min-height:90px;resize:vertical;font-family:var(--sans);line-height:1.55}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .row-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:14px}
  .row-sig{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:620px){.row,.row-3,.row-sig{grid-template-columns:1fr}}

  /* ── Pills ── */
  .pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .pill{position:relative;cursor:pointer}
  .pill input{position:absolute;opacity:0;pointer-events:none}
  .pill span{display:inline-flex;padding:9px 15px;border:1.5px solid var(--border);
             border-radius:22px;font-size:13px;font-weight:600;background:var(--white);
             color:var(--body);transition:all var(--transition);user-select:none}
  .pill:hover span{border-color:var(--gold-warm)}
  .pill input:checked + span{background:var(--teal);border-color:var(--teal);color:var(--white)}
  .pill input:focus-visible + span{box-shadow:0 0 0 3px rgba(46,107,127,0.2)}
  .prompt{font-weight:600;color:var(--navy);margin-bottom:8px;font-size:14px}

  /* ── Screening table ── */
  .table-wrap{margin:12px 0 16px 0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{background:var(--navy);color:var(--white);font-family:var(--sans);font-size:11px;
           font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:12px 14px;text-align:left}
  thead th.c{text-align:center}
  tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody td + td{border-left:1px solid var(--border)}
  tbody tr:nth-child(even) td{background:var(--sand)}
  td.q{font-size:14px;color:var(--body);line-height:1.5}
  td.yn{text-align:center;width:70px}
  td.yn input{width:18px;height:18px;accent-color:var(--teal);cursor:pointer}

  /* ── Attestations ── */
  .attest{display:flex;align-items:flex-start;gap:10px;margin:4px 0 12px 0;
          padding:10px 14px;background:var(--sand);border:1px solid var(--border);
          border-radius:8px;cursor:pointer;transition:border-color var(--transition)}
  .attest:hover{border-color:var(--gold-warm)}
  .attest input{margin-top:2px;width:16px;height:16px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
  .attest span{font-size:13px;color:var(--body);line-height:1.45;font-weight:500}
  .attest input:checked ~ span{color:var(--navy)}

  /* ── Youth callout ── */
  .youth-callout{display:flex;gap:14px;align-items:flex-start;background:var(--warn-bg);
                 border:1.5px solid rgba(176,122,30,0.35);border-left:5px solid var(--warn);
                 border-radius:10px;padding:16px 18px;margin-bottom:18px}
  .youth-callout .ico{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--warn);
                      color:var(--white);display:flex;align-items:center;justify-content:center;
                      font-family:var(--serif);font-size:17px;margin-top:2px}
  .youth-callout .who{display:block;font-size:10px;font-weight:700;letter-spacing:0.22em;color:var(--warn);text-transform:uppercase;margin-bottom:4px}
  .youth-callout .head{display:block;font-family:var(--serif);font-size:19px;color:var(--navy);line-height:1.25;margin-bottom:4px}
  .youth-callout .sub{display:block;font-size:13px;color:var(--body);line-height:1.55}

  /* ── Review ── */
  .rv-sec{border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;background:var(--white)}
  .rv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
           font-family:var(--serif);font-size:17px;color:var(--navy)}
  .rv-edit{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;
           font-family:var(--sans);font-size:12px;font-weight:700;color:var(--teal);cursor:pointer;transition:all var(--transition)}
  .rv-edit:hover{border-color:var(--teal);background:var(--sand)}
  .rv-row{display:grid;grid-template-columns:180px 1fr;gap:10px;padding:5px 0;border-top:1px solid var(--sand);font-size:14px}
  .rv-row:first-of-type{border-top:none}
  .rv-k{color:var(--muted);font-weight:600}
  .rv-v{color:var(--body);word-break:break-word}
  @media(max-width:620px){.rv-row{grid-template-columns:1fr}}

  /* ── Buttons / nav ── */
  .nav{display:flex;gap:12px;align-items:center;margin-top:24px;flex-wrap:wrap}
  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
       padding:12px 24px;border:none;border-radius:8px;font-family:var(--sans);
       font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);text-decoration:none}
  .btn-primary{background:var(--navy);color:var(--white);box-shadow:0 2px 8px rgba(27,58,75,0.25)}
  .btn-primary:hover:not(:disabled){background:var(--teal)}
  .btn-primary:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none}
  .btn-secondary{background:var(--white);color:var(--body);border:1.5px solid var(--border)}
  .btn-secondary:hover{background:var(--sand);border-color:var(--gold)}
  .btn-ghost{background:none;color:var(--muted);border:none;font-weight:600;font-size:13px;cursor:pointer;padding:8px 4px}
  .btn-ghost:hover{color:var(--teal)}
  .nav-spacer{margin-left:auto}
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
        border-radius:50%;animation:spin 0.7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn.loading .spin{display:inline-block}

  .wz-next{margin:6px 0 18px 18px;color:var(--body);font-size:14px;line-height:1.7}

  /* ── Submitted banner ── */
  .submitted-banner{background:var(--success-bg);border:1.5px solid rgba(39,174,96,0.3);border-radius:10px;
                    padding:18px 20px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start}
  .submitted-banner .ico{width:30px;height:30px;border-radius:50%;background:var(--success);flex-shrink:0;
                         display:flex;align-items:center;justify-content:center;margin-top:2px}
  .submitted-banner .ico svg{width:16px;height:16px;color:var(--white)}
  .submitted-banner b{display:block;color:var(--navy);font-family:var(--serif);font-size:17px;font-weight:400;margin-bottom:3px}
  .submitted-banner span{color:var(--body);font-size:13px;line-height:1.5;display:block}
  .submitted-banner code{font-family:ui-monospace,Menlo,monospace;color:var(--teal);background:var(--white);
                         padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;border:1px solid var(--border)}

  /* ── Messages ── */
  .msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none}
  .msg.ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(39,174,96,0.2);display:block}
  .msg.err{background:var(--error-bg);color:var(--error);border:1px solid rgba(192,57,43,0.2);display:block}

  .auth-gate{text-align:center;padding:80px 24px;color:var(--muted);font-size:14px}
  footer{text-align:center;padding:24px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <a class="brand" href="dashboard.html" aria-label="Safeguard Hub home">
      <svg viewBox="0 0 24 28" width="22" height="26" fill="none" aria-hidden="true">
        <path d="M12 1 L22 5 V14 C22 20 17 25 12 27 C7 25 2 20 2 14 V5 Z" stroke="#C4A46A" stroke-width="1.5"/>
        <path d="M12 1 L22 5 V14 C22 20 17 25 12 27 Z" fill="#C4A46A" fill-opacity="0.12"/>
      </svg>
      <div class="brand-text"><small>Safeguard Hub</small><span class="brand-name">Bethany Chapel</span></div>
    </a>
    <div id="userChip" style="margin-left:8px"></div>
  </div>
</header>

<main class="page">

  <div class="wrap" id="authGate"><div class="auth-gate">Checking your access&hellip;</div></div>

  <div class="wrap" id="wizardWrap" style="display:none">
    <div class="eyebrow">Safeguard Hub &middot; Getting set up</div>
    <h1>Welcome to Bethany Chapel</h1>
    <div class="page-lede">A quick, one-time setup so we can place you well and keep our children and youth safe.</div>

    <div class="progress"><div id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">&nbsp;</div>

    <div class="card"><div id="wizardHost"></div></div>

    <div id="msg" class="msg"></div>

    <div class="nav" id="navBar">
      <button type="button" class="btn btn-secondary" id="backBtn" style="display:none">&larr; Back</button>
      <div class="actions nav-spacer">
        <button type="button" class="btn-ghost" id="saveLaterBtn" style="display:none">Save &amp; finish later</button>
        <button type="button" class="btn btn-primary" id="nextBtn" style="display:none"><span class="spin"></span><span class="label">Continue &rarr;</span></button>
        <button type="button" class="btn btn-primary" id="submitBtn" style="display:none"><span class="spin"></span><span class="label">Submit application</span></button>
      </div>
    </div>
  </div>

</main>

<footer>Safeguard Hub &middot; Bethany Chapel &middot; <a href="privacy.html" style="color:var(--teal);text-decoration:none;border-bottom:1px solid rgba(46,107,127,0.3)">Privacy</a></footer>

<script type="module">
  import { onUserChange } from "./sg-auth.js";
  import { getOrCreateProfile } from "./sg-profile.js";
  import { mountUserChip } from "./sg-user-chip.js";
  import { createWizard } from "./sg-wizard.js";

  mountUserChip(document.getElementById("userChip"));

  const HERE         = "onboarding.html";
  const authGate     = document.getElementById("authGate");
  const wizardWrap   = document.getElementById("wizardWrap");
  const host         = document.getElementById("wizardHost");
  const progressBar  = document.getElementById("progressBar");
  const progressLabel= document.getElementById("progressLabel");
  const msg          = document.getElementById("msg");
  const backBtn      = document.getElementById("backBtn");
  const nextBtn      = document.getElementById("nextBtn");
  const submitBtn    = document.getElementById("submitBtn");
  const saveLaterBtn = document.getElementById("saveLaterBtn");

  function showMsg(text, kind) {
    if (!text) { msg.className = "msg"; msg.textContent = ""; return; }
    msg.textContent = text; msg.className = "msg " + kind;
  }

  let wiz = null;

  // ── Auth gate: signed-in + verified ──
  onUserChange(async user => {
    if (!user) { location.replace("sign-in.html?next=" + encodeURIComponent(HERE)); return; }
    if (!user.emailVerified) { location.replace("verify-email.html"); return; }

    let profile = null;
    try { profile = await getOrCreateProfile(); } catch (_) { profile = null; }

    authGate.style.display = "none";
    wizardWrap.style.display = "block";

    wiz = createWizard({
      host,
      onProgress: ({ pct, label }) => {
        progressBar.style.width = pct + "%";
        progressLabel.textContent = label || " ";
      },
      onMessage: (text, kind) => showMsg(text, kind),
      onNavState: (st) => {
        if (st.submitting !== undefined) {
          submitBtn.classList.toggle("loading", !!st.submitting);
          submitBtn.disabled = !!st.submitting;
          nextBtn.disabled = !!st.submitting;
          backBtn.disabled = !!st.submitting;
          return;
        }
        backBtn.style.display      = st.showBack ? "inline-flex" : "none";
        backBtn.disabled           = !st.canBack;
        nextBtn.style.display      = st.showNext ? "inline-flex" : "none";
        submitBtn.style.display    = st.showSubmit ? "inline-flex" : "none";
        saveLaterBtn.style.display = st.showSaveLater ? "inline-block" : "none";
        if (st.nextLabel) nextBtn.querySelector(".label").textContent = st.nextLabel;
        nextBtn.disabled = false; backBtn.disabled = !st.canBack;
        submitBtn.classList.remove("loading"); submitBtn.disabled = false;
      },
    });

    try {
      wiz.hydrate(profile);
      wiz.render();
    } catch (err) {
      // Safety valve: never leave the user on a blank screen.
      host.innerHTML = '<p class="wz-lede">Something went wrong loading the form. ' +
        'You can still use the <a href="profile-setup.html" style="color:var(--teal)">standard setup</a> ' +
        'or the <a href="SG-FRM-001.html" style="color:var(--teal)">application form</a>.</p>';
      console.error("Wizard boot error:", err);
    }
  });

  backBtn.addEventListener("click", () => wiz && wiz.back());
  nextBtn.addEventListener("click", () => wiz && wiz.next());
  saveLaterBtn.addEventListener("click", () => wiz && wiz.saveLater());
  submitBtn.addEventListener("click", () => wiz && wiz.submit());
</script>

<script src="sg-nav.js"></script>
</body>
</html>
