<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate your account — Safeguard Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="sg-redesign.css">
<style>
  /* ── Standalone activation page: white card centered on the cool canvas ── */
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--sg-card);border:1px solid var(--sg-border);border-radius:var(--sg-r-card);
        padding:40px 36px;max-width:440px;width:100%;box-shadow:var(--sg-shadow-hero)}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .brand img{height:32px;width:auto;display:block}
  .brand-divider{width:1px;height:28px;background:var(--sg-border)}
  .brand-text{display:flex;flex-direction:column;line-height:1.1;font-family:var(--sg-head);
              font-weight:800;font-size:12px;letter-spacing:0.18em}
  .brand-text small{font-size:12px;color:var(--sg-ink);text-transform:uppercase;font-weight:800}
  .brand-name{color:var(--sg-blue);text-transform:uppercase}
  .eyebrow{font-family:var(--sg-sans);font-weight:700;font-size:12px;letter-spacing:.15em;
           color:var(--sg-blue);text-transform:uppercase;margin-bottom:8px}
  h1{font-family:var(--sg-head);font-weight:800;font-size:28px;color:var(--sg-ink);
     line-height:1.1;letter-spacing:-0.02em;margin-bottom:6px}
  .lede{font-size:15px;color:var(--sg-body);margin-bottom:20px}
  label{display:block;font-family:var(--sg-sans);font-weight:700;font-size:11.5px;color:var(--sg-body);
        letter-spacing:.08em;text-transform:uppercase;margin:16px 0 7px}
  .fi{width:100%;padding:13px 15px;border:1px solid var(--sg-border-strong);border-radius:var(--sg-r-input);
      font-family:var(--sg-sans);font-size:15px;color:var(--sg-ink);background:var(--sg-field-bg);
      transition:border-color var(--sg-t),box-shadow var(--sg-t),background var(--sg-t)}
  .fi:focus{border-color:var(--sg-blue);background:#fff;outline:none;box-shadow:var(--sg-focus-ring)}
  .fi[readonly]{background:var(--sg-canvas);color:var(--sg-muted)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
       padding:13px 20px;border:1px solid transparent;border-radius:var(--sg-r-btn);font-weight:600;font-size:14px;
       cursor:pointer;margin-top:16px;font-family:var(--sg-sans);
       transition:box-shadow var(--sg-t),border-color var(--sg-t),background var(--sg-t)}
  .btn-primary{background:var(--sg-navy);color:#fff;box-shadow:var(--sg-shadow-btn)}
  .btn-primary:hover:not(:disabled){background:#0c4262}
  .btn-primary:disabled{background:var(--sg-muted);cursor:not-allowed;box-shadow:none}
  .btn-sso{background:#fff;color:var(--sg-body);border:1px solid var(--sg-border-strong);margin-top:10px}
  .btn-sso:hover:not(:disabled){border-color:var(--sg-blue);color:var(--sg-ink)}
  .btn-sso:disabled{opacity:.5;cursor:not-allowed}
  .sep{display:flex;align-items:center;gap:10px;margin:22px 0;color:var(--sg-muted);
       font-family:var(--sg-sans);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
  .sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--sg-rule)}
  .msg{padding:11px 14px;border-radius:var(--sg-r-input);font-size:13px;margin-top:14px;display:none}
  .msg.err{background:var(--sg-red-bg);color:var(--sg-red);border:1px solid var(--sg-red-border);display:block}
  .loading{text-align:center;color:var(--sg-muted);padding:40px 0}
  @media (max-width:460px){.card{padding:32px 24px}.btn{min-height:44px}}
</style>
</head>
<body class="sg-redesign">
  <div class="card">
    <div class="brand">
      <img src="bethany-logo.png" alt="Bethany Chapel">
      <span class="brand-divider" aria-hidden="true"></span>
      <div class="brand-text"><small>Safeguard</small><span class="brand-name">Hub</span></div>
    </div>
    <div id="loading" class="loading">Checking your invitation…</div>

    <div id="form" style="display:none">
      <div class="eyebrow">Welcome to the Safeguard Hub</div>
      <h1>Let's get you in</h1>
      <div class="lede">Set a password, or continue with a Google / Microsoft account.</div>

      <label for="email">Your email</label>
      <input id="email" class="fi" type="email" readonly>

      <label for="pw">Create a password</label>
      <input id="pw" class="fi" type="password" autocomplete="new-password" placeholder="At least 8 characters">

      <label for="pw2">Confirm password</label>
      <input id="pw2" class="fi" type="password" autocomplete="new-password">

      <button id="setPw" class="btn btn-primary">Activate &amp; continue</button>

      <div class="sep">or</div>

      <button id="google" class="btn btn-sso">Continue with Google</button>
      <button id="microsoft" class="btn btn-sso" disabled title="Coming soon">Continue with Microsoft</button>

      <div id="msg" class="msg"></div>
    </div>

    <div id="badlink" class="loading" style="display:none">
      This activation link is invalid or has expired.<br>
      Ask the Safeguard Coordinator to send a fresh invite.
    </div>
  </div>

<script type="module">
  import {
    verifyPasswordResetCode, confirmPasswordReset,
    signInWithEmailAndPassword, signInWithPopup,
    GoogleAuthProvider, OAuthProvider,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { auth } from "./sg-firebase.js";
  import { saveProfile, routeAfterLogin, loadProfile } from "./sg-profile.js";

  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const oobCode = params.get("oobCode");
  const mode = params.get("mode"); // "resetPassword" for our links

  function showErr(t){ $("msg").textContent = t; $("msg").className = "msg err"; }

  // After any successful sign-in: flip status invited→activated, then route.
  async function finishActivation() {
    // Force a token refresh so the {role} custom claim is present.
    await auth.currentUser.getIdToken(true);
    const profile = await loadProfile();
    if (profile && profile.status === "invited") {
      await saveProfile({ status: "activated", activatedAt: new Date().toISOString() });
    }
    const fresh = await loadProfile();
    location.replace(routeAfterLogin(fresh));   // → dashboard, which auto-launches the wizard
  }

  // ── Validate the action code on load ────────────────────────
  (async () => {
    if (!oobCode || mode !== "resetPassword") { $("loading").style.display="none"; $("badlink").style.display="block"; return; }
    try {
      const email = await verifyPasswordResetCode(auth, oobCode);
      $("email").value = email;
      $("loading").style.display = "none";
      $("form").style.display = "block";
    } catch {
      $("loading").style.display = "none";
      $("badlink").style.display = "block";
    }
  })();

  // ── Door 1: set a password ──────────────────────────────────
  $("setPw").addEventListener("click", async () => {
    const pw = $("pw").value, pw2 = $("pw2").value, email = $("email").value;
    $("msg").className = "msg";
    if (pw.length < 8) return showErr("Password must be at least 8 characters.");
    if (pw !== pw2)    return showErr("Passwords don't match.");
    $("setPw").disabled = true;
    try {
      await confirmPasswordReset(auth, oobCode, pw);   // also marks email verified
      await signInWithEmailAndPassword(auth, email, pw);
      await finishActivation();
    } catch (err) {
      $("setPw").disabled = false;
      showErr("Couldn't activate. " + (err.message || "Try again."));
    }
  });

  // ── Door 2: Google SSO ──────────────────────────────────────
  $("google").addEventListener("click", async () => {
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
      await finishActivation();
    } catch (err) { showErr("Google sign-in failed. " + (err.message || "")); }
  });

  // ── Door 3: Microsoft SSO (enabled once Entra registration exists) ──
  $("microsoft").addEventListener("click", async () => {
    try {
      const provider = new OAuthProvider("microsoft.com");
      await signInWithPopup(auth, provider);
      await finishActivation();
    } catch (err) { showErr("Microsoft sign-in failed. " + (err.message || "")); }
  });
</script>
</body>
</html>
