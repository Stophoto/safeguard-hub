.btn-secondary { background: var(--white); color: var(--body); border: 1.5px solid var(--border); }

<!-- ═══ PHASE 4 · FIREBASE AUTH GATE ═══ -->
<!-- Hides the rest of the page until Firebase auth is resolved.
     Anonymous visitors are redirected to sign-in. Signed-in users
     have the legacy Sheets password pulled from Firestore silently
     so they never see the old password prompt. -->
<div id="sg-auth-overlay" class="no-print" aria-live="polite">
  <div style="text-align:center">
    <div class="sg-spinner" aria-hidden="true"></div>
    <div>Checking sign-in…</div>
  </div>

<script type="module">
  import { onUserChange } from "./sg-auth.js";
  import { db } from "./sg-firebase.js";
  import { getOrCreateProfile } from "./sg-profile.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── Profile cache + "when ready" helper for React form autofill ──
  // The React forms below can't use ES modules directly, so we hang a
  // tiny API off window that they poll via React.useEffect.
  window.SG_currentProfile = null;
  window.__sgProfileWaiters = [];
  window.SG_whenProfileReady = function (cb) {
    if (window.SG_currentProfile) { cb(window.SG_currentProfile); return; }
    window.__sgProfileWaiters.push(cb);
  };

  // Resolves a mapping key → value from the current profile. Mapping keys
  // are short symbolic names the forms use; values are the actual field
  // paths on the profile document.
  const PROFILE_FIELD_RESOLVERS = {
    fullName:     p => [p.firstName, p.lastName].filter(Boolean).join(" ").trim(),
    firstName:    p => p.firstName || "",
    lastName:     p => p.lastName || "",
    preferredName:p => p.preferredName || "",
    email:        p => p.email || "",
    phone:        p => p.phone || "",
    dob:          p => p.dob || "",
    street:       p => (p.address && p.address.street) || "",
    city:         p => (p.address && p.address.city) || "",
    province:     p => (p.address && p.address.province) || "",
    postal:       p => (p.address && p.address.postal) || "",
    emergencyName:    p => (p.emergencyContact && p.emergencyContact.name) || "",
    emergencyPhone:   p => (p.emergencyContact && p.emergencyContact.phone) || "",
    emergencyRelation:p => (p.emergencyContact && p.emergencyContact.relationship) || "",
  };

  // Call from a form's useEffect:
  //   window.SG_applyPrefill(set, { fullName: "fullName", email: "email", phone: "phone", dob: "dob" });
  // Only fills empty fields — never overwrites what the user has typed.
  window.SG_applyPrefill = function (setFn, mapping, getFn) {
    window.SG_whenProfileReady(function (profile) {
      if (!profile) return;
      Object.keys(mapping).forEach(function (formKey) {
        const resolver = PROFILE_FIELD_RESOLVERS[mapping[formKey]];
        if (!resolver) return;
        const value = resolver(profile);
        if (!value) return;
        // Don't overwrite a value the user already typed.
        if (getFn && getFn(formKey)) return;
        setFn(formKey, value);
      });
    });
  };

  onUserChange(async (user) => {
    if (!user) {
      location.replace("sign-in.html?next=index.html");
      return;
    }
    if (!user.emailVerified) {
      location.replace("verify-email.html");
      return;
    }
    // Fetch the legacy Sheets password from Firestore the first time this
    // browser visits the hub. Saves it to localStorage the way the existing
    // backend client expects. Once Phase 5 retires Sheets, this all goes away.
    if (!localStorage.getItem("sg_hub_pw")) {
      try {
        const snap = await getDoc(doc(db, "config", "hub"));
        if (snap.exists() && snap.data().sheetsPassword) {
          localStorage.setItem("sg_hub_pw", snap.data().sheetsPassword);
        }
      } catch (err) {
        console.warn("Couldn't fetch hub config:", err);
      }
    }

    // Load profile into the cache so autofill on forms can pick it up
    try {
      const profile = await getOrCreateProfile();
      window.SG_currentProfile = profile;
      const waiters = window.__sgProfileWaiters || [];
      window.__sgProfileWaiters = [];
      waiters.forEach(function (cb) { try { cb(profile); } catch (_) {} });
    } catch (err) {
      console.warn("Couldn't load profile for autofill:", err);
    }

    document.body.classList.add("sg-ready");
  });
</script>

<script>
/* ═══ HUB BACKEND CLIENT ═══ */
(function(){
  var STORAGE_KEY = "sg_hub_pw";
  var BACKEND_URL = "https://script.google.com/macros/s/AKfycbzaPYsIj00ztt2la7cVrJyxm4OYl3EFS_t-I9u0bXpZV0CeaYvko23OLYYjcYFS4qoxpg/exec";

  localStorage.removeItem("sg_hub_auth");
  localStorage.removeItem("sg_hub_config");

  function getPassword() { return localStorage.getItem(STORAGE_KEY) || ""; }
  function savePassword(pw) { localStorage.setItem(STORAGE_KEY, pw); }
  function clear() { localStorage.removeItem(STORAGE_KEY); }
  function isConfigured() { return !!getPassword(); }

  async function call(action, data) {
    var pw = getPassword();
    if (!pw) throw { type: "NOT_CONFIGURED", message: "Not signed in." };
    var payload = Object.assign({ action: action, password: pw }, data || {});
    var res;
    try {
      res = await fetch(BACKEND_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload), redirect: "follow" });
    } catch(err) { throw { type: "NETWORK_ERROR", message: "Network error \u2014 check your connection." }; }
    var result;
    try { result = await res.json(); } catch(err) { throw { type: "API_ERROR", message: "Invalid response from server." }; }
    if (!result.success) {
      if (result.error === "AUTH_FAILED") { clear(); }
      throw { type: result.error || "API_ERROR", message: result.message || "Server error." };
    }
    return result;
  }

  async function testPassword(pw) {
    var res = await fetch(BACKEND_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "ping", password: pw }), redirect: "follow" });
    var result = await res.json();
    if (!result.success) throw new Error(result.message || "Invalid password.");
    return true;
  }

  async function appendRow(tab, row) { return call("appendRow", { tab: tab, row: row }); }
  async function appendRows(tab, rows) { return call("appendRows", { tab: tab, rows: rows }); }
  function getErrorMessage(err) { if (err && err.message) return err.message; return "An unexpected error occurred."; }

  window.SheetsService = { appendRow: appendRow, appendRows: appendRows, isConfigured: isConfigured, getErrorMessage: getErrorMessage };
  window.SG_Hub = { isConfigured: isConfigured, savePassword: savePassword, clear: clear, testPassword: testPassword };
})();
</script>

})();

<!-- ═══ SUBMISSION WRITE PATH ═══ -->
<!-- Firestore is the source of truth for every Hub form submission.
     The legacy Google Sheets mirror runs best-effort — if the shared
     Apps Script password is present (populated from config/hub in
     Firestore) it writes a duplicate row; if not, the Sheets call is
     skipped silently. Either way the user's submit succeeds as long
     as the Firestore write succeeds. -->
<script type="module">
  import { createSubmission } from "./sg-submissions.js";
  import { onUserChange } from "./sg-auth.js";

  onUserChange(() => {
    if (!window.SheetsService || window.__sgSubmissionsWrapped) return;
    window.__sgSubmissionsWrapped = true;

    const origAppendRow  = window.SheetsService.appendRow;
    const origAppendRows = window.SheetsService.appendRows;
    const hasLegacyPw    = () => !!(window.SG_Hub && window.SG_Hub.isConfigured());

    window.SheetsService.appendRow = async function (tab, row) {
      // Firestore is primary — awaited, must succeed for the form to succeed.
      await createSubmission({ tabName: tab, rowData: row, recordId: row && row[0] });
      // Sheets mirror is best-effort — only attempted when the legacy password
      // is set, and any failure is logged (never surfaced to the user).
      if (hasLegacyPw()) {
        origAppendRow(tab, row).catch(err => console.warn("Sheets mirror failed:", err));
      }
      return { success: true };
    };

    window.SheetsService.appendRows = async function (tab, rows) {
      const list = rows || [];
      for (const row of list) {
        await createSubmission({ tabName: tab, rowData: row, recordId: row && row[0] });
      }
      if (hasLegacyPw()) {
        origAppendRows(tab, list).catch(err => console.warn("Sheets mirror failed:", err));
      }
      return { success: true };
    };
  });
</script>
