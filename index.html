  --border: #E4E0DA;

  --success: #27AE60;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);

  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); color: var(--body); background: var(--cream); -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.55; }

/* Focus & Input */
.fi { width: 100%; padding: 13px 15px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 15px; color: var(--body); background: var(--white); transition: border-color var(--transition), box-shadow var(--transition); }
.fi:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(46,107,127,0.1); outline: none; }
.fi::placeholder { color: var(--muted); }
select.fi { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%239A958F' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; }
textarea.fi { resize: none; overflow: hidden; min-height: 80px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 30px; border: none; border-radius: 8px; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); letter-spacing: 0.01em; }
.btn-primary { background: var(--navy); color: var(--white); box-shadow: 0 2px 8px rgba(27,58,75,0.25); }
.btn-primary:hover { background: var(--teal); box-shadow: 0 4px 16px rgba(46,107,127,0.3); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; transform: none; }
.btn-secondary { background: var(--white); color: var(--body); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--sand); border-color: var(--gold); }
.btn-danger { background: var(--error); color: var(--white); box-shadow: 0 2px 8px rgba(192,57,43,0.25); }
.btn-danger:hover { background: #A93226; transform: translateY(-1px); }
.btn-ghost { background: none; color: var(--teal); padding: 8px 16px; }
.btn-ghost:hover { background: rgba(46,107,127,0.06); }
.btn-sm { padding: 10px 20px; font-size: 14px; border-radius: 6px; font-weight: 700; }

/* Cards */
.card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--border); transition: all var(--transition); }
.card:hover { border-color: var(--gold-warm); box-shadow: var(--shadow-md); }
.card-active { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(46,107,127,0.08); }

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.animate-up { animation: fadeUp 0.4s ease-out both; }
.animate-in { animation: fadeIn 0.3s ease-out both; }

/* Print */
@media print { .no-print { display: none !important; } body { background: #fff; } }

/* Checkbox custom */
input[type="checkbox"], input[type="radio"] { accent-color: var(--teal); width: 18px; height: 18px; cursor: pointer; }

<script>
/* ═══ SHEETS CONFIG — localStorage-based ═══ */
/* Credentials are never stored in this file. They live in the browser's localStorage.
   On first load, a setup screen prompts the admin to paste their credentials.
   To reset: open browser console and run: localStorage.removeItem('sg_hub_config') */
(function(){
  var STORAGE_KEY = "sg_hub_config";
  function loadConfig() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed.workbookId && parsed.credentials && parsed.credentials.client_email && parsed.credentials.private_key) {
          window.SAFEGUARD_SHEETS_CONFIG = parsed;
          return true;
        }
      }
    } catch(e) { console.warn("Config load failed:", e); }
    window.SAFEGUARD_SHEETS_CONFIG = null;
    return false;
  }
  function saveConfig(cfg) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    window.SAFEGUARD_SHEETS_CONFIG = cfg;
  }
  function clearConfig() {
    localStorage.removeItem(STORAGE_KEY);
    window.SAFEGUARD_SHEETS_CONFIG = null;
  }
  loadConfig();
  window.SG_ConfigManager = { loadConfig: loadConfig, saveConfig: saveConfig, clearConfig: clearConfig, isLoaded: function(){ return !!window.SAFEGUARD_SHEETS_CONFIG; } };
})();
</script>

<script>
/* ═══ SHEETS SERVICE ═══ */
(function(){
  var SCOPES = "https://www.googleapis.com/auth/spreadsheets";
  var TOKEN_URL = "https://oauth2.googleapis.com/token";
  var SHEETS_BASE = "https://sheets.googleapis.com/v4/spreadsheets";
  var TOKEN_LIFETIME = 3500;
  var cachedToken = null;
  var tokenExpiry = 0;

  function cfg() {
    return (typeof window !== "undefined" && window.SAFEGUARD_SHEETS_CONFIG) || { workbookId: "", credentials: { client_email: "", private_key: "" } };
  }

  function isConfigured(o) {
    var c = o || cfg();
    return !!(c.workbookId && c.credentials && c.credentials.client_email && c.credentials.private_key);
  }

  function createJWT(email, pk) {
    if (typeof KJUR === "undefined") throw { type: "JSRSASIGN_MISSING" };
    var now = Math.floor(Date.now() / 1000);
    return KJUR.jws.JWS.sign("RS256", JSON.stringify({ alg: "RS256", typ: "JWT" }), JSON.stringify({ iss: email, scope: SCOPES, aud: TOKEN_URL, iat: now, exp: now + 3600 }), pk);
  }

  async function getToken(o) {
    var c = o || cfg();
    if (cachedToken && Date.now() / 1000 < tokenExpiry) return cachedToken;
    var jwt = createJWT(c.credentials.client_email, c.credentials.private_key);
    var res = await fetch(TOKEN_URL, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=" + jwt });
    if (!res.ok) { var b = await res.text().catch(function(){ return ""; }); throw { type: "AUTH_FAILED", detail: "HTTP " + res.status + ": " + b }; }
    var data = await res.json();
    cachedToken = data.access_token;
    tokenExpiry = Date.now() / 1000 + TOKEN_LIFETIME;
    return cachedToken;
  }

  var ERRORS = { NOT_CONFIGURED: "Sheets not configured.", AUTH_FAILED: "Auth failed — check credentials.", NETWORK_ERROR: "Network error — check connection.", API_ERROR: "Sheets API error.", RATE_LIMITED: "Rate limited — wait and retry.", JSRSASIGN_MISSING: "Security library missing — refresh page." };

  async function appendRow(tab, row, o) {
    var c = o || cfg();
    if (!isConfigured(c)) throw { type: "NOT_CONFIGURED" };
    var token = await getToken(c);
    var url = SHEETS_BASE + "/" + c.workbookId + "/values/" + encodeURIComponent(tab) + "!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS";
    var res = await fetch(url, { method: "POST", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" }, body: JSON.stringify({ values: [row] }) });
    if (res.status === 429) throw { type: "RATE_LIMITED" };
    if (!res.ok) { if (res.status === 401 || res.status === 403) { cachedToken = null; tokenExpiry = 0; throw { type: "AUTH_FAILED" }; } throw { type: "API_ERROR" }; }
    return res.json();
  }

  async function appendRows(tab, rows, o) {
    var c = o || cfg();
    if (!isConfigured(c)) throw { type: "NOT_CONFIGURED" };
    var token = await getToken(c);
    var url = SHEETS_BASE + "/" + c.workbookId + "/values/" + encodeURIComponent(tab) + "!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS";
    var res = await fetch(url, { method: "POST", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" }, body: JSON.stringify({ values: rows }) });
    if (res.status === 429) throw { type: "RATE_LIMITED" };
    if (!res.ok) { if (res.status === 401 || res.status === 403) { cachedToken = null; tokenExpiry = 0; throw { type: "AUTH_FAILED" }; } throw { type: "API_ERROR" }; }
    return res.json();
  }

  function getErrorMessage(err) { return (err && err.type && ERRORS[err.type]) || (err && err.message) || "Unexpected error."; }

  window.SheetsService = { appendRow: appendRow, appendRows: appendRows, isConfigured: isConfigured, getErrorMessage: getErrorMessage };
})();
</script>

  function FormFRM001(props) {
    var s = useState({}); var f=s[0]; var setF=s[1];
